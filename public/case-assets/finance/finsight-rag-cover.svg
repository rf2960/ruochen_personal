<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">FinSight RAG finance news analyzer cover</title>
  <desc id="desc">A calm finance intelligence dashboard showing news retrieval, agent workflow, and signal evaluation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef5f4"/>
      <stop offset="0.52" stop-color="#f7f4ee"/>
      <stop offset="1" stop-color="#e8edf2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#1c2a2d" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#415e63" stroke-width="1">
    <path d="M0 130H1600M0 260H1600M0 390H1600M0 520H1600M0 650H1600M0 780H1600"/>
    <path d="M150 0V900M300 0V900M450 0V900M600 0V900M750 0V900M900 0V900M1050 0V900M1200 0V900M1350 0V900M1500 0V900"/>
  </g>
  <g transform="translate(110 105)">
