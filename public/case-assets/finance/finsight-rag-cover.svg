      <text x="24" y="86" font-family="Inter, Manrope, Arial, sans-serif" font-size="19" fill="#5f6f70">TF-IDF ranking</text>
      <text x="24" y="122" font-family="Inter, Manrope, Arial, sans-serif" font-size="19" fill="#5f6f70">chunked articles</text>
