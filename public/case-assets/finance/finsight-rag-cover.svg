      <text x="24" y="86" font-family="Inter, Manrope, Arial, sans-serif" font-size="19" fill="#5f6f70">Yahoo Finance</text>
      <text x="24" y="122" font-family="Inter, Manrope, Arial, sans-serif" font-size="19" fill="#5f6f70">RSS sources</text>
      <text x="24" y="158" font-family="Inter, Manrope, Arial, sans-serif" font-size="19" fill="#5f6f70">Market data</text>
