    <text x="0" y="78" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" fill="#101820">Finance News</text>
    <text x="0" y="164" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" fill="#101820">Analyzer</text>
    <text x="0" y="225" font-family="Inter, Manrope, Arial, sans-serif" font-size="28" fill="#61706f">retrieval-grounded market news analysis</text>
  </g>
