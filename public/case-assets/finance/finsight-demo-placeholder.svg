<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">FinSight RAG demo placeholder</title>
  <desc id="desc">A placeholder dashboard layout for future Finance News Analyzer screenshots.</desc>
